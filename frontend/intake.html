<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Hopper - Partner Intake</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-emerald: #061F1A;
            --emerald-light: #0B2D26;
            --brushed-gold: #D4AF37;
            --text-main: #E0E0E0;
            --white: #FFFFFF;
        }
        body {
            background-color: var(--deep-emerald);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .intake-container {
            background: var(--emerald-light);
            border: 1px solid var(--brushed-gold);
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--brushed-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        p.subtitle { margin-bottom: 2rem; opacity: 0.8; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.2rem; }
        label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--brushed-gold);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--white);
            border-radius: 4px;
            font-family: inherit;
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--brushed-gold);
        }
        textarea { resize: vertical; min-height: 100px; }
        .help-text {
            display: block;
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.4rem;
            line-height: 1.4;
        }
        button {
            background: var(--brushed-gold);
            color: var(--deep-emerald);
            border: none;
            padding: 1rem 2rem;
            font-family: 'Outfit';
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            transition: all 0.3s;
        }
        button:hover { background: var(--white); }
        .btn-group { display: flex; gap: 10px; margin-top: 1rem; }
        .secondary-btn {
            background: rgba(255,255,255,0.05);
            color: var(--brushed-gold);
            border: 1px solid var(--brushed-gold);
            padding: 1rem;
            font-family: 'Outfit';
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
        .voice-reg-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 206, 209, 0.1);
            color: #00CED1;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Outfit';
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0, 206, 209, 0.35);
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 1.5rem;
        }
        .voice-reg-btn:hover {
            background: rgba(0, 206, 209, 0.18);
            border-color: #00CED1;
            transform: translateY(-1px);
        }
        .voice-reg-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        #successMsg { display: none; color: #4CAF50; margin-top: 1rem; text-align: center; font-weight: bold; }

        @media (max-width: 480px) {
            .intake-container { padding: 1.5rem; }
            h1 { font-size: 1.4rem; }
            .btn-group { flex-direction: column; }
            .secondary-btn { padding: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="intake-container">
        <h1>Join Island Hopper</h1>
        <p class="subtitle">Connect with travelers by listing your local services.</p>
        
        <div style="text-align: center;">
            <a href="voice-intake.html" class="voice-reg-btn">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                Register by voice instead
            </a>
        </div>

        <form id="intakeForm">
            <div class="form-group">
                <label>Name or Business Name</label>
                <input type="text" id="name" required placeholder="e.g. Captain Jose">
            </div>
            <div class="form-group">
                <label>Type of Service (Select all that apply)</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3);">
                    <label style="display: flex; align-items: center; gap: 8px; text-transform: none; font-weight: 400; cursor: pointer;">
                        <input type="checkbox" name="service" value="boat captain" style="width: auto;"> Boat Captain
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; text-transform: none; font-weight: 400; cursor: pointer;">
                        <input type="checkbox" name="service" value="surf lesson" style="width: auto;"> Surf Lesson
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; text-transform: none; font-weight: 400; cursor: pointer;">
                        <input type="checkbox" name="service" value="jungle guide" style="width: auto;"> Jungle Guide
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; text-transform: none; font-weight: 400; cursor: pointer;">
                        <input type="checkbox" name="service" value="diving" style="width: auto;"> Diving
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; text-transform: none; font-weight: 400; cursor: pointer;">
                        <input type="checkbox" name="service" value="other" style="width: auto;"> Other
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="text" id="whatsapp" required placeholder="+507 6000-0000">
            </div>
            <div class="form-group">
                <label>Specialty or Locations</label>
                <input type="text" id="specialty" required placeholder="e.g. Zapatilla tours, Bastimentos drops">
            </div>
            <div class="form-group">
                <label>Pricing Policy & Conditions</label>
                <textarea id="pricing" required placeholder="Explain your rates... e.g. Base rate $20 + $5/hr waiting. Double at night. Max 6 people."></textarea>
                <span class="help-text">Our AI reads this to quote travelers accurately. Be as detailed as you need.</span>
            </div>
            <div class="btn-group">
                <button type="submit">Submit for Review</button>
                <a href="index.html" class="secondary-btn">Go to Main App</a>
            </div>
            <div id="successMsg">Application submitted successfully! We will review it shortly.</div>
        </form>
    </div>

    <script>
        document.getElementById('intakeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Submitting...';
            btn.disabled = true;

            const selectedServices = Array.from(document.querySelectorAll('input[name="service"]:checked')).map(cb => cb.value).join(', ');
            
            const payload = {
                name: document.getElementById('name').value,
                category: selectedServices || 'other',
                whatsapp: document.getElementById('whatsapp').value,
                specialty: document.getElementById('specialty').value,
                pricing_policy: document.getElementById('pricing').value
            };

            try {
                const response = await fetch('/api/intake', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    document.getElementById('intakeForm').reset();
                    document.getElementById('successMsg').style.display = 'block';
                    btn.textContent = 'Submit Another';
                } else {
                    alert('Failed to submit. Please try again.');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error.');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
