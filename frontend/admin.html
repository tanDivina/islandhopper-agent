<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Hopper - Admin Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="admin-layout">
        <header class="admin-header">
            <div class="header-brand">
                <span class="brand-icon">&#x2693;</span>
                <h1>Captain Review</h1>
            </div>
            <div class="header-stats">
                <span id="pendingCount" class="stat-badge">0 pending</span>
                <span id="approvedCount" class="stat-badge stat-approved">0 approved</span>
                <span id="rejectedCount" class="stat-badge stat-rejected">0 rejected</span>
            </div>
        </header>

        <div class="admin-body">
            <aside class="review-queue" id="reviewQueue">
                <div class="queue-header">
                    <h2>Review Queue</h2>
                </div>
                <div id="queueList" class="queue-list">
                    <div class="queue-empty">Start a session to load submissions</div>
                </div>
            </aside>

            <main class="agent-panel">
                <div class="agent-conversation" id="agentConversation">
                    <div class="agent-welcome">
                        <div class="welcome-icon">&#x1F50D;</div>
                        <h2>Review Agent</h2>
                        <p>Start a voice session to review pending captain submissions with your AI assistant.</p>
                        <button id="startReviewBtn" class="start-btn">
                            <span class="btn-icon">&#x1F3A4;</span>
                            Start Review Session
                        </button>
                    </div>
                </div>

                <div class="agent-controls" id="agentControls" style="display:none;">
                    <div class="transcript-area" id="transcriptArea">
                        <div class="transcript-text" id="transcriptText"></div>
                    </div>
                    <div class="input-row">
                        <div class="mic-status" id="micStatus">
                            <span class="mic-dot" id="micDot"></span>
                            <span id="statusLabel">Listening...</span>
                        </div>
                        <input type="text" id="textInput" class="text-input" placeholder="Type a message or use voice...">
                        <button id="sendTextBtn" class="send-btn-small">Send</button>
                        <button id="endSessionBtn" class="end-btn">End</button>
                    </div>
                </div>
            </main>

            <aside class="detail-panel" id="detailPanel">
                <div class="detail-empty">
                    <p>Captain details will appear here during review</p>
                </div>
            </aside>
        </div>
    </div>

    <script src="admin-review.js"></script>
</body>
</html>
